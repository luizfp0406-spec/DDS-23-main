    <h1>AULA 3</h1>

        width: 200px;
        height: 300px;
        background-color: aqua;
      "

      <p>Ousadia e alegria</p>
    </div>

    <!-- divs tops -->
    <div style="width: 500px; background-color: red">
      <div style="width: 200px; height: 100px; background-color: white">
        Qualquer Coisa
      </div>
      <div style="width: 200px; height: 100px; background-color: black">
        Qualquer Coisa 2
      </div>
    </div>
  </body>
